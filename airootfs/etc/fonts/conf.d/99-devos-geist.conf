<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Make Geist available to Plymouth during early boot (initramfs).
       The Plymouth initcpio hook copies /etc/fonts/conf.d/ and the theme dir
       into the initramfs; this snippet tells fontconfig to scan the theme dir
       so Image.Text("DevOS", ..., "Geist Light 48") resolves correctly. -->
  <dir>/usr/share/plymouth/themes/devos</dir>
</fontconfig>
