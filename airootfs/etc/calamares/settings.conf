# /etc/calamares/modules is searched first so DevOS's native Python job modules
# (copyairootfs, devossetup, devoscleanup) are discovered before the stock ones.
modules-search: [ /etc/calamares/modules, local, /usr/lib/calamares/modules ]

# Do NOT pre-set rootMountPoint here. The mount module owns it end-to-end: it
# mounts the target (to /tmp/calamares-root-XXXX in this Calamares version) and
# writes that path to globalStorage. The native DevOS modules (copyairootfs,
# devossetup, devoscleanup) and every built-in module (machineid, fstab, ...)
# all read rootMountPoint from globalStorage, so they share one target path.
# Pre-setting the key makes the mount module skip the globalStorage update,
# which split-brains the path → 'chroot: failed to run command /bin/sh'.
global-storage:
  efiSystemPartition: /boot

sequence:
  - show:
    # devosnetwork: "connect before you install" page. View-only (no exec job,
    # empty jobs()), runs first so users can join Wi-Fi / confirm a wired link
    # before any installation step. Always skippable — it can never block.
    - devosnetwork
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

  - exec:
    - partition
    - mount
    - copyairootfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - devossetup
    - initcpiocfg
    - initcpio
    - bootloader
    - devoscleanup
    - umount

  - show:
    - finished

branding: devos
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-back-and-next-during-exec: true
quit-at-end: false
