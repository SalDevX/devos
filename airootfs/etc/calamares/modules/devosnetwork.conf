---
# SPDX-License-Identifier: GPL-3.0-or-later
# Runtime configuration for the DevOS network page (view module: devosnetwork).
#
# The compiled plugin (libcalamares_viewmodule_devosnetwork.so) and its
# auto-generated module.desc are installed by the forked Calamares package
# (devos/pkgbuilds/calamares). This .conf lives in the airootfs so the cadence
# and timeout can be tuned without recompiling Calamares — modules-search lists
# /etc/calamares/modules first, so this file wins.

# The page's QML is bundled inside the plugin's Qt resource (qrc), so resolve it
# from there: searchQmlFile() builds "qrc:/devosnetwork.qml".
qmlSearch: qrc
qmlFilename: devosnetwork

# Wi-Fi list auto-refresh cadence, in milliseconds (clamped to >= 1000 in code).
refreshIntervalMs: 5000

# Per-attempt Wi-Fi connection timeout, in milliseconds (clamped to >= 3000).
connectTimeoutMs: 15000
