# DevOS GRUB menu — UEFI boot for the installer ISO.
#
# Based on the archiso releng grub.cfg (archiso 88), adapted for DevOS:
#   * linux-lts kernel + initramfs paths (DevOS ships linux-lts, not linux)
#   * the DevOS kernel cmdline (quiet splash …) so Plymouth runs on the live ISO
#   * DevOS branding on the menu entries
#   * a brand background image (graphics-mode gfxterm)
#
# mkarchiso copies this file to /boot/grub/grub.cfg on the ISO, and copies every
# NON-.cfg file in this dir (background.png) to /boot/grub/ as well — so the
# background path below resolves at boot. Regenerate the image with
# tools/gen-boot-splash.py.

# Load partition table and file system modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

# Use graphics-mode output (required for the background image)
if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    insmod gfxterm
    insmod png
    set gfxmode="auto"
    terminal_input console
    terminal_output gfxterm
fi

# DevOS branding: brand background + readable menu colors. If the image fails to
# load, fall back to a plain dark menu (still fully usable).
if background_image -m stretch /boot/grub/background.png ; then
    set color_normal=light-gray/black
    set color_highlight=white/black
else
    set menu_color_normal=cyan/blue
    set menu_color_highlight=white/blue
fi

# Enable serial console
insmod serial
insmod usbserial_common
insmod usbserial_ftdi
insmod usbserial_pl2303
insmod usbserial_usbdebug
if serial --unit=0 --speed=115200; then
    terminal_input --append serial
    terminal_output --append serial
fi

# Get a human readable platform identifier
if [ "${grub_platform}" == 'efi' ]; then
    archiso_platform='UEFI'
elif [ "${grub_platform}" == 'pc' ]; then
    archiso_platform='BIOS'
else
    archiso_platform="${grub_cpu}-${grub_platform}"
fi

# Set default menu entry
default=devos
timeout=15
timeout_style=menu


# Menu entries

menuentry "DevOS install medium (%ARCH%, ${archiso_platform})" --class arch --class gnu-linux --class gnu --class os --id 'devos' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 vt.global_cursor_default=0
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
}

menuentry "DevOS install medium with speakup screen reader (%ARCH%, ${archiso_platform})" --hotkey s --class arch --class gnu-linux --class gnu --class os --id 'devos-accessibility' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
}


if [ "${grub_platform}" == 'efi' -a "${grub_cpu}" == 'x86_64' -a -f '/boot/memtest86+/memtest.efi' ]; then
    menuentry 'Run Memtest86+ (RAM test)' --class memtest86 --class memtest --class gnu --class tool {
        set gfxpayload=800x600,1024x768
        linux /boot/memtest86+/memtest.efi
    }
fi

if [ "${grub_platform}" == 'efi' ]; then
    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi

menuentry 'System shutdown' --class shutdown --class poweroff {
    echo 'System shutting down...'
    halt
}

menuentry 'System restart' --class reboot --class restart {
    echo 'System rebooting...'
    reboot
}
