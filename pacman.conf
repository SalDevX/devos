# DevOS build-time pacman.conf (used by mkarchiso to populate the ISO).
[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# --- DevOS local repo (prebuilt AUR packages) ---------------------------------
# AUR/foreign packages (see aur-packages.txt) cannot be pulled by name at build
# time. Build them into a local repo and uncomment this block so the names in
# packages.x86_64 (e.g. visual-studio-code-bin, xfdashboard) resolve.
#
#   mkdir -p ~/devos-local && cd ~/devos-local
#   paru -S --clonedir . <aur-pkgs>   # or makepkg each PKGBUILD
#   repo-add devos-local.db.tar.zst *.pkg.tar.zst
#
#[devos-local]
#SigLevel = Optional TrustAll
#Server = file:///home/user/devos-local
