# DevOS build-time pacman.conf (used by mkarchiso to populate the ISO).
[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# --- DevOS local repo (prebuilt AUR packages) ---------------------------------
# AUR/foreign packages (see aur-packages.txt) cannot be pulled by name at build
# time. Build them into a local repo so the names in packages.x86_64 (e.g.
# calamares, yay, brave-bin, xfdashboard) resolve at mkarchiso time.
#
# Storage layout: the "space2" external drive is the sole source of truth.
#   bash devos/tools/build-aur-repo.sh /run/media/craftworkson/space2/devos-local
#
[devos-local]
SigLevel = Optional TrustAll
Server = file:///run/media/craftworkson/space2/devos-local
