# Builds the DevOS ISO from this archiso profile and uploads it as an artifact.
# Note: this builds the REPO-ONLY image (packages.x86_64). AUR packages
# (aur-build-list.txt) require a local repo built with tools/build-aur-repo.sh
# and are NOT included here by default.
name: build-iso

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged          # mkarchiso needs mount/loop devices
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install archiso
        run: pacman -Sy --noconfirm --needed archiso git

      - name: Build ISO
        run: mkarchiso -v -w /tmp/devos-work -o ./out .

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: devos-iso
          path: out/*.iso
          if-no-files-found: error
          retention-days: 14
